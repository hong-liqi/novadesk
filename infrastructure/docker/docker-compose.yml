services:
  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    networks:
      - data
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-auth:
    image: postgres:16-alpine
    container_name: portfolio-postgres-auth
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: auth_db
    networks:
      - data
    ports:
      - '5432:5432'
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio -d auth_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    container_name: portfolio-postgres-notification
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: notification_db
    networks:
      - data
    ports:
      - '5433:5432'
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio -d notification_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-helpdesk:
    image: postgres:16-alpine
    container_name: portfolio-postgres-helpdesk
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: helpdesk_db
    networks:
      - data
    ports:
      - '5434:5432'
    volumes:
      - postgres_helpdesk_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio -d helpdesk_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-analytics:
    image: postgres:16-alpine
    container_name: portfolio-postgres-analytics
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: analytics_db
    networks:
      - data
    ports:
      - '5435:5432'
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio -d analytics_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-chat:
    image: postgres:16-alpine
    container_name: portfolio-postgres-chat
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: chat_db
    networks:
      - data
    ports:
      - '5436:5432'
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio -d chat_db']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: portfolio-mailpit
    networks:
      - backend
    ports:
      - '8025:8025'
      - '1025:1025'

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    container_name: portfolio-auth-service
    env_file:
      - ../../services/auth-service/.env.example
    environment:
      SERVICE_NAME: auth-service
      PORT: 3001
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://portfolio:portfolio@postgres-auth:5432/auth_db
    networks:
      - backend
      - data
    depends_on:
      redis:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    container_name: portfolio-notification-service
    env_file:
      - ../../services/notification-service/.env.example
    environment:
      SERVICE_NAME: notification-service
      PORT: 3002
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://portfolio:portfolio@postgres-notification:5432/notification_db
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    networks:
      - backend
      - data
    depends_on:
      redis:
        condition: service_healthy
      postgres-notification:
        condition: service_healthy
      mailpit:
        condition: service_started

  helpdesk-api:
    build:
      context: ../..
      dockerfile: services/helpdesk-api/Dockerfile
    container_name: portfolio-helpdesk-api
    env_file:
      - ../../services/helpdesk-api/.env.example
    environment:
      SERVICE_NAME: helpdesk-api
      PORT: 3003
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://portfolio:portfolio@postgres-helpdesk:5432/helpdesk_db
    networks:
      - backend
      - data
    ports:
      - '3003:3003'
    depends_on:
      redis:
        condition: service_healthy
      postgres-helpdesk:
        condition: service_healthy

  analytics-api:
    build:
      context: ../..
      dockerfile: services/analytics-api/Dockerfile
    container_name: portfolio-analytics-api
    env_file:
      - ../../services/analytics-api/.env.example
    environment:
      SERVICE_NAME: analytics-api
      PORT: 3004
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://portfolio:portfolio@postgres-analytics:5432/analytics_db
    networks:
      - backend
      - data
    ports:
      - '3004:3004'
    depends_on:
      redis:
        condition: service_healthy
      postgres-analytics:
        condition: service_healthy

  realtime-chat-service:
    # WebSocket: single replica is fine for local dev. Enable sticky sessions
    # (ip_hash) on nginx/CapRover when scaling gateway or this service.
    build:
      context: ../..
      dockerfile: services/realtime-chat/Dockerfile
    container_name: portfolio-realtime-chat-service
    env_file:
      - ../../services/realtime-chat/.env.example
    environment:
      SERVICE_NAME: realtime-chat-service
      PORT: 3005
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://portfolio:portfolio@postgres-chat:5432/chat_db
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
    networks:
      - backend
      - data
    ports:
      - '3005:3005'
    depends_on:
      redis:
        condition: service_healthy
      postgres-chat:
        condition: service_healthy
      auth-service:
        condition: service_started

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    container_name: portfolio-gateway
    environment:
      SERVICE_NAME: gateway
      PORT: 3000
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3002
      HELPDESK_SERVICE_URL: http://helpdesk-api:3003
      ANALYTICS_SERVICE_URL: http://analytics-api:3004
      REALTIME_CHAT_SERVICE_URL: http://realtime-chat-service:3005
      JWT_ISSUER: portfolio-os-auth
      JWT_AUDIENCE: portfolio-os
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      PROXY_TIMEOUT_MS: 10000
    networks:
      - backend
      - frontend
      - data
    depends_on:
      - auth-service
      - notification-service
      - helpdesk-api
      - analytics-api
      - realtime-chat-service

  helpdesk-saas:
    build:
      context: ../..
      dockerfile: apps/helpdesk-saas/Dockerfile
    container_name: portfolio-helpdesk
    environment:
      PORT: 3010
    networks:
      - frontend

  analytics-dashboard:
    build:
      context: ../..
      dockerfile: apps/analytics-dashboard/Dockerfile
    container_name: portfolio-analytics
    environment:
      PORT: 3011
    networks:
      - frontend

  admin-panel:
    build:
      context: ../..
      dockerfile: apps/admin-panel/Dockerfile
    container_name: portfolio-admin
    environment:
      PORT: 3012
    networks:
      - frontend

  realtime-chat:
    build:
      context: ../..
      dockerfile: apps/realtime-chat/Dockerfile
    container_name: portfolio-chat-app
    environment:
      PORT: 3014
    networks:
      - frontend

  website:
    build:
      context: ../..
      dockerfile: website/Dockerfile
    container_name: portfolio-website
    environment:
      PORT: 3013
    networks:
      - frontend

  nginx:
    image: nginx:1.25-alpine
    container_name: portfolio-nginx
    ports:
      - '80:80'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - frontend
    depends_on:
      - gateway
      - helpdesk-saas
      - analytics-dashboard
      - admin-panel
      - realtime-chat
      - website

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge

volumes:
  redis_data:
  postgres_auth_data:
  postgres_notification_data:
  postgres_helpdesk_data:
  postgres_analytics_data:
  postgres_chat_data:
